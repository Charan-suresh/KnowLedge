services:
  - type: web
    name: knowledge
    env: python
    envVars:
      - key: INFERENCE_BACKEND
        value: "hf_space"
      - key: HF_SPACE_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_AUTH_TOKEN
        sync: false
      - key: DEMO_MODE
        value: "false"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn knowledge.main:app --worker-class uvicorn.workers.UvicornWorker --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --log-level info
